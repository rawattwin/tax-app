<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ระบบภาษี 50 ทวิ (Cloud Sync)</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>
    <script>
        // 2. ตั้งค่า Firebase Config (ใช้ค่าจากโปรเจกต์ tawi-ab594 ของคุณ)
        const firebaseConfig = {
            apiKey: "AIza...", 
            authDomain: "tawi-ab594.firebaseapp.com",
            projectId: "tawi-ab594",
            storageBucket: "tawi-ab594.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore(); // เชื่อมต่อฐานข้อมูลออนไลน์

        // 3. ฟังก์ชันบันทึกข้อมูลพนักงานลง Cloud
        function addEmployeeToCloud(name, salary, tax) {
            db.collection("employees").add({
                name: name,
                salary: salary,
                tax: tax,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                console.log("บันทึกข้อมูลเรียบร้อย ข้อมูลจะปรากฏทุกเครื่องทันที!");
            });
        }

        // 4. ฟังก์ชันดึงข้อมูลแบบ Real-time (ซิงค์อัตโนมัติ)
        db.collection("employees").orderBy("createdAt", "desc")
            .onSnapshot((snapshot) => {
                let employees = [];
                snapshot.forEach((doc) => {
                    employees.push(doc.data());
                });
                // เรียกฟังก์ชันวาดตารางของคุณที่นี่
                updateTableUI(employees); 
            });
    </script>
</body>
</html>
